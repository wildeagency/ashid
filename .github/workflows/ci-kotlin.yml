name: CI · Kotlin

on:
  push:
    branches: [main]
    paths:
      - 'kotlin/**'
      - '.github/workflows/ci-kotlin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'kotlin/**'
      - '.github/workflows/ci-kotlin.yml'

jobs:
  kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test
