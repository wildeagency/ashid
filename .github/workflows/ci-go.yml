name: CI · Go

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/ci-go.yml'

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
          working-directory: go

  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.21', '1.25', '1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test
        run: go test -race -count=1 ./...
