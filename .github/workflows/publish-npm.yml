name: Publish to npm

# Publishes the TypeScript package to npm using OIDC trusted publishing — no
# long-lived NPM_TOKEN required. The trust relationship is configured on the
# npm package settings page (Settings → Trusted Publisher) and binds:
#   publisher        = GitHub Actions
#   org/repo         = wildeagency/ashid
#   workflow file    = publish-npm.yml  (this file's basename)
# The runner mints an OIDC token (id-token: write) which npm exchanges for a
# short-lived publish credential. Provenance attestation is generated
# automatically by the npm CLI on this path.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish TypeScript Package
    runs-on: ubuntu-latest
    permissions:
      # Required for npm OIDC trusted publishing.
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        # Trusted-publisher OIDC requires npm CLI ≥ 11.5.1; Node 22 currently
        # ships with npm 10.x.
        run: npm install -g npm@latest

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: npm publish --access public
